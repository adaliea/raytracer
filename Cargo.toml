[package]
name = "raytracer"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
env_logger = "0.11"
glam = { version = "0.30.9", features = ["rand", "zerocopy", "approx", "fast-math"] }

image = "0.25.9"
indicatif = "0.18.3"
log = "0.4"
rayon = "1.11"
clap = { version = "4", features = ["derive"] }
bvh = { version = "0.11.0", features = ["simd"] }
color-backtrace = { version = "0.7" }

[profile.release]
debug = true
